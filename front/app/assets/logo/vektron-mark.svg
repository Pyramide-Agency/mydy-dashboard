<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Vektron logo mark concept 2">
  <defs>
    <linearGradient id="c2-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="c2-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="c2-inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Outer hexagon -->
  <polygon
    points="50,6 88,28 88,72 50,94 12,72 12,28"
    fill="url(#c2-fill)"
    stroke="url(#c2-stroke)"
    stroke-width="2"
  />

  <!-- Middle hexagon (rotated 30deg) -->
  <polygon
    points="50,18 74,32 74,68 50,82 26,68 26,32"
    fill="none"
    stroke="#7C3AED"
    stroke-width="1"
    stroke-opacity="0.4"
    transform="rotate(30 50 50)"
  />

  <!-- Inner diamond — emerald accent -->
  <polygon
    points="50,30 66,50 50,70 34,50"
    fill="none"
    stroke="url(#c2-inner)"
    stroke-width="2"
  />

  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="url(#c2-inner)"/>

  <!-- Grid connector lines -->
  <line x1="50" y1="6"  x2="50" y2="30" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="50" y1="70" x2="50" y2="94" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="12" y1="28" x2="34" y2="50" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="88" y1="28" x2="66" y2="50" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="12" y1="72" x2="34" y2="50" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="88" y1="72" x2="66" y2="50" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.5"/>
</svg>
